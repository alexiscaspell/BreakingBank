# Builds the Android APK and publishes a GitHub Release when mobile code changes on main.
#
# Versioning: PaulHatch/semantic-version reads conventional commits since the last
# apk-v* tag (only commits touching apps/mobile). Examples:
#   feat(mobile): ...  -> minor bump
#   fix: ...            -> patch bump
#   feat!: ...          -> major bump (or BREAKING CHANGE in body)
# If no conventional bump is detected, patch is incremented so each release gets a new APK.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME / DOCKERHUB_TOKEN — not needed here (APK goes to GitHub Releases)
#
# Recommended repository variables (Settings → Actions → Variables):
#   EXPO_PUBLIC_API_URL
#   EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID — Android OAuth client (package + SHA-1 in Google Cloud)

name: Mobile APK Release

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/mobile-apk.yml"
      - "scripts/ci-bump-apk-version.sh"

concurrency:
  group: mobile-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semver from conventional commits
        id: semver
        uses: PaulHatch/semantic-version@v5.4.0
        with:
          tag_prefix: apk-v
          major_pattern: "(BREAKING CHANGE|!)"
          minor_pattern: "feat(\\(.+\\))?:"
          change_path: apps/mobile
          version_format: "${major}.${minor}.${patch}"

      - name: Resolve release version
        id: version
        run: |
          VERSION="${{ steps.semver.outputs.version }}"
          INCREMENT="${{ steps.semver.outputs.increment }}"

          if [ -z "$VERSION" ] || [ "$VERSION" = "0.0.0" ]; then
            VERSION="1.0.0"
          fi

          if [ "$INCREMENT" = "none" ]; then
            IFS=. read -r MAJOR MINOR PATCH <<<"$VERSION"
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            echo "No conventional bump; defaulting to patch: $VERSION"
          fi

          echo "version=$VERSION" >>"$GITHUB_OUTPUT"
          echo "tag=apk-v$VERSION" >>"$GITHUB_OUTPUT"

      - name: Apply version to Expo app
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
          ./scripts/ci-bump-apk-version.sh "${{ steps.version.outputs.version }}"

      - name: Restore Gradle cache
        uses: actions/cache/restore@v4
        id: gradle-cache
        with:
          path: apps/mobile/.gradle-home
          key: gradle-${{ hashFiles('apps/mobile/package-lock.json') }}
          restore-keys: |
            gradle-

      - name: Prepare Gradle cache for Docker
        run: |
          mkdir -p apps/mobile/.gradle-home
          touch apps/mobile/.gradle-home/.keep
          if [ "${{ steps.gradle-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Gradle cache restored ($(du -sh apps/mobile/.gradle-home | cut -f1))"
          else
            echo "Gradle cache miss — full Gradle build expected"
          fi
          if [ -z "${{ vars.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}" ]; then
            echo "::warning::EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID repo variable is not set — Google Sign-In will not work in the APK"
          else
            echo "Google Android client: ${{ vars.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build release APK (Docker)
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: ${{ vars.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}
        uses: docker/build-push-action@v6
        with:
          context: apps/mobile
          file: apps/mobile/Dockerfile.apk
          load: true
          tags: breakingbank-apk:ci
          build-args: |
            EXPO_PUBLIC_API_URL=${{ env.EXPO_PUBLIC_API_URL || 'https://api.breakingbank.example' }}
            EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID=${{ env.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}
            BUILD_TYPE=release
          # mode=min: Docker layer cache for SDK + npm only (~3 min saved).
          # Gradle (~25 min) uses actions/cache via .gradle-home COPY in Dockerfile.apk.
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Extract APK and Gradle cache from image
        run: |
          mkdir -p build/android apps/mobile/.gradle-home
          CID="breakingbank-apk-$$"
          docker create --name "$CID" breakingbank-apk:ci
          docker cp "$CID:/output/." build/android/
          docker cp "$CID:/app/.gradle-home/." apps/mobile/.gradle-home/ 2>/dev/null || true
          docker rm "$CID"
          ls -la build/android/

      - name: Save Gradle cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: apps/mobile/.gradle-home
          key: gradle-${{ hashFiles('apps/mobile/package-lock.json') }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: BreakingBank ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            build/android/breakingbank-release.apk
          fail_on_unmatched_files: true
