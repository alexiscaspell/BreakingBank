# Builds and pushes the API image to Docker Hub when API code changes on main.
# Python build runs entirely inside Docker — the runner only invokes docker CLI.
#
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

name: API Docker

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/api-docker.yml"

concurrency:
  group: api-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        run: |
          IMAGE=alexiscaspell/breakingbank-api
          SHORT_SHA="${GITHUB_SHA::7}"
          docker build \
            -f api/Dockerfile \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:main" \
            -t "${IMAGE}:build-${GITHUB_RUN_NUMBER}" \
            -t "${IMAGE}:${SHORT_SHA}" \
            api
          docker push "${IMAGE}" --all-tags
