# Builds and pushes the API image to Docker Hub when API code changes on main.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME  (e.g. alexiscaspell)
#   DOCKERHUB_TOKEN     (Docker Hub access token)

name: API Docker

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/api-docker.yml"

concurrency:
  group: api-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: alexiscaspell/breakingbank-api
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=build-${{ github.run_number }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
