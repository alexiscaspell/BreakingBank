# Builds and pushes the web UI image to Docker Hub when mobile/web app code changes on main.
# The Expo web export runs entirely inside Docker (node:24 in Dockerfile.web).
# GitHub Actions only orchestrates checkout + docker CLI — no Node build on the runner.
#
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# Optional variables: EXPO_PUBLIC_API_URL, EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID

name: UI Docker

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/ui-docker.yml"

concurrency:
  group: ui-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ vars.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
        run: |
          IMAGE=alexiscaspell/breakingbank-ui
          SHORT_SHA="${GITHUB_SHA::7}"
          docker build \
            -f apps/mobile/Dockerfile.web \
            --build-arg "EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL}" \
            --build-arg "EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID=${EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID}" \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:main" \
            -t "${IMAGE}:build-${GITHUB_RUN_NUMBER}" \
            -t "${IMAGE}:${SHORT_SHA}" \
            apps/mobile
          docker push "${IMAGE}" --all-tags
