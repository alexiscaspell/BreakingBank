# Builds and pushes the web UI image to Docker Hub when mobile/web app code changes on main.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN
#
# Recommended repository variables (Settings → Actions → Variables):
#   EXPO_PUBLIC_API_URL                  — URL browsers use to reach the API
#   EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID     — Google OAuth Web client (Sign in with Google)

name: UI Docker

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/ui-docker.yml"

concurrency:
  group: ui-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: alexiscaspell/breakingbank-ui
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=build-${{ github.run_number }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/mobile
          file: ./apps/mobile/Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            EXPO_PUBLIC_API_URL=${{ vars.EXPO_PUBLIC_API_URL }}
            EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID=${{ vars.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
